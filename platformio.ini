; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Common settings for all environments
[env]
platform = ststm32
framework = arduino
debug_tool = stlink
upload_protocol = stlink
lib_deps = 
  mikalhart/TinyGPSPlus@^1.0.2
  adafruit/Adafruit HMC5883 Unified@^1.2.3
  adafruit/Adafruit MMC56x3@^1.0.2
  adafruit/Adafruit Unified Sensor@^1.1.14

; STM32F401CB Black Pill (84 MHz, 128KB Flash, 64KB RAM)
; Default environment - use for most development
[env:genericSTM32F401CB]
board = genericSTM32F401CB

; STM32F405RG (168 MHz, 1024KB Flash, 192KB RAM)
; Higher performance variant with more resources
[env:genericSTM32F405RG]
board = genericSTM32F405RG
